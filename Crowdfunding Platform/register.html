<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/register.css">
    <title>Register</title>
</head>
<body>
    <div class="register">
        <h2>Create Account</h2>
        <form id="register">
            <div class="container">
                <label for="fullname">*Fullname</label>
                <input type="text" id="fullname" placeholder="John Youssef" required>
            </div>
            <div class="container">
                <label for="email">*Email</label>
                <input type="text" id="email" placeholder="example12@gmail.com" required>
            </div>
            <div class="container">
                <label for="password">*Password</label>
                <input type="text" id="password" placeholder="Secured Password" required>
            </div>
            <button type="submit" id="regBtn">Register</button>
            <div>
                <h4>Already have an account? <a href="./login.html">Login</a></h4>
            </div>

        </form>

    </div>


    <script src="./JS/register.js" defer></script>
    
</body>
</html>
