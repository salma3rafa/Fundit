<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pledges</title>
    <link rel="stylesheet" href="./css/pledges.css">

</head> 
<body>
    <h1>Fill this form to complete donation</h1>
    <div class="donate"  >
        <form class="donate" id="donateForm" autocomplete="off">
            <div class="form-group">
                <label for="name">Donator name</label>
                <input id="name" min="3" max="20" required>
            </div>
            <div class="form-group">
                <label for="expire">Expire date</label>
                <input type="date" id="expire" required />
            </div>
            <div class="form-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount"  placeholder="Enter donation amount" required>
            </div>
            <button type="submit" class="donate-btn">Donate</button>
        </form>
    </div>
    
    <script src="./JS/pledges.js"></script>
</body>
</html>
